# -------- Desktop / Tablet --------
#
# FORK DIVERGENCE 2026-05-15: Hemma's stock desktop layout uses
# grid-auto-flow: column + single row + overflow-x: auto, which on a mouse-
# driven desktop browser only scrolls via shift+wheel (scrollbar is hidden
# by design). Locally tested and the scroll was effectively dead — broken
# UX on non-touch devices. Patched to wrap rows: grid-auto-flow: row +
# grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)). Cards now
# wrap to multiple rows and all are visible without needing horizontal
# scroll. On upstream sync, re-evaluate if upstream added a non-touch
# fallback.
position: absolute
z-index: 3
display: grid
grid-auto-flow: row
grid-template-columns: repeat(auto-fill, minmax(var(--hemma-entity-col-width-current, var(--hemma-entity-col-width-desktop, 200px)), 1fr))
grid-auto-rows: auto
justify-content: var(--hemma-entity-justify-current, var(--hemma-entity-justify-desktop, flex-start))
grid-column-gap: 8px
grid-row-gap: 8px
margin: 0
inset: >
  auto var(--hemma-entity-right-inset-current, var(--hemma-entity-right-inset-desktop, var(--hemma-rail-left, var(--page-gutter, 8vw))))
       var(--hemma-entity-bottom-current, var(--hemma-entity-bottom-desktop, 0px))
       var(--hemma-entity-left-inset-current, var(--hemma-entity-left-inset-desktop, var(--hemma-rail-left, var(--page-gutter, 8vw))))
padding: 20px 0 40px 0
align-content: end
box-sizing: border-box
overflow: visible

mediaquery:
  # -------- Mobile Portrait --------
  "(max-width: 767px) and (orientation: portrait), (max-height: 500px) and (orientation: portrait)":
    position: absolute
    z-index: 4
    inset: >
      var(--hemma-tiles-top-portrait, calc(env(safe-area-inset-top, 0px) + 350px))
      var(--hemma-rail-left, var(--page-gutter-mobile, 11px))
      auto
      var(--hemma-rail-left, var(--page-gutter-mobile, 11px))
    margin: 0
    padding: 0 0 calc(env(safe-area-inset-bottom, 0px) + var(--hemma-nav-height, 130px) + 8px) 0
    min-height: >-
      calc(100dvh
        - var(--hemma-tiles-top-portrait, calc(env(safe-area-inset-top, 0px) + 350px))
        - env(safe-area-inset-bottom, 0px)
        - var(--hemma-nav-height, 130px)
        - 8px)
    display: grid
    grid-auto-flow: row
    grid-template-columns: repeat(2, minmax(0, 1fr))
    grid-template-rows: none
    grid-auto-columns: auto
    grid-auto-rows: min-content
    justify-items: stretch
    align-content: end
    align-items: start
    overflow: visible
    touch-action: auto
    overscroll-behavior: auto
    scroll-snap-type: none
    scrollbar-width: none
    -ms-overflow-style: none

  # -------- Mobile Landscape --------
  "(max-height: 600px) and (orientation: landscape)":
    position: absolute
    z-index: 4
    inset: >
      calc(var(--hemma-tiles-top-landscape, calc(env(safe-area-inset-top, 0px) + 105px)))
      var(--hemma-tiles-right-pad-landscape, 0px)
      auto
      auto
    width: calc((2 * var(--hemma-entity-col-width-landscape, 160px)) + 8px)
    margin: 0
    padding: 0 0 20px 0
    box-sizing: border-box
    display: grid
    grid-auto-flow: row
    grid-template-columns: repeat(2, var(--hemma-entity-col-width-landscape, 160px))
    grid-auto-rows: min-content
    gap: 8px
    justify-items: stretch
    align-content: start
    align-items: start
    overflow: visible
    touch-action: auto
    overscroll-behavior: auto
    scroll-snap-type: none
